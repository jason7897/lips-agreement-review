<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIPS 협약 사업계획서 검토 도구</title>
<style>
  :root {
    --bg: #f5f6f8; --card: #ffffff; --border: #e2e4e8; --text: #1c1e21;
    --muted: #6b7280; --accent: #2f6fed;
    --ok-bg: #e8f5e9; --ok-fg: #1b7a2e;
    --warn-bg: #fff8e1; --warn-fg: #916800;
    --bad-bg: #fdecea; --bad-fg: #b3261e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg); color: var(--text); }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; }
  header h1 { font-size: 18px; margin: 0; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  nav { display: flex; gap: 4px; padding: 0 24px; background: var(--card); border-bottom: 1px solid var(--border); }
  nav button { border: none; background: none; padding: 12px 16px; font-size: 14px; cursor: pointer; color: var(--muted);
    border-bottom: 2px solid transparent; }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  main { max-width: 1000px; margin: 24px auto; padding: 0 24px; }
  .view { display: none; }
  .view.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 15px; margin: 0 0 12px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  input[type=file] { font-size: 13px; }
  button.primary { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 9px 16px;
    font-size: 13px; cursor: pointer; }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  button.ghost { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 9px 14px;
    font-size: 13px; cursor: pointer; color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .badge.적합 { background: var(--ok-bg); color: var(--ok-fg); }
  .badge.수정필요 { background: var(--warn-bg); color: var(--warn-fg); }
  .badge.불가 { background: var(--bad-bg); color: var(--bad-fg); }
  .badge.확인필요 { background: #ececec; color: #555; }
  .muted { color: var(--muted); font-size: 12px; }
  .item-content { max-width: 320px; max-height: 80px; overflow-y: auto; white-space: pre-wrap; font-size: 12px; color: var(--muted); }
  #spinner { display: none; margin-left: 8px; font-size: 13px; color: var(--muted); }
  .empty { color: var(--muted); font-size: 13px; padding: 24px; text-align: center; }
  .summary { display: flex; gap: 16px; margin-bottom: 12px; font-size: 13px; }
  .summary b { font-size: 16px; }
  .link-btn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 0; font-size: 13px; text-decoration: underline; }
</style>
</head>
<body>

<header>
  <h1>LIPS 협약 사업계획서 검토 도구</h1>
  <p>중기부 운영지침을 학습시키고, 사업계획서를 올리면 수정사항/불가 항목을 1차로 걸러줍니다. (참고용 1차 검토이며 최종 판단은 담당자가 합니다)</p>
</header>

<nav>
  <button class="tab active" data-view="review">사업계획서 검토</button>
  <button class="tab" data-view="guidelines">지침 관리</button>
  <button class="tab" data-view="history">검토 이력</button>
</nav>

<main>

  <div id="view-review" class="view active">
    <div class="card">
      <h2>사업계획서 업로드</h2>
      <div class="row">
        <input type="file" id="plan-file" accept=".pdf,.hwp,.hwpx" />
        <button class="primary" id="btn-review">검토 시작</button>
        <span id="spinner">⏳ 검토 중... (항목이 많으면 1~2분 걸릴 수 있어요)</span>
      </div>
      <p class="muted" id="review-hint"></p>
    </div>
    <div id="review-result"></div>
  </div>

  <div id="view-guidelines" class="view">
    <div class="card">
      <h2>지침 문서 업로드</h2>
      <div class="row">
        <input type="file" id="guideline-file" accept=".pdf,.hwp,.hwpx" />
        <button class="primary" id="btn-upload-guideline">업로드 및 학습</button>
        <span id="spinner-g" style="display:none" class="muted">⏳ 처리 중...</span>
      </div>
      <p class="muted">사업비 관리지침, 운영지침 등 여러 문서를 순서대로 업로드할 수 있습니다 (누적됩니다).</p>
    </div>
    <div class="card">
      <div class="row" style="justify-content: space-between;">
        <h2 style="margin:0">학습된 지침 목록</h2>
        <button class="ghost" id="btn-clear-guidelines">전체 삭제</button>
      </div>
      <div id="guideline-list"></div>
    </div>
  </div>

  <div id="view-history" class="view">
    <div class="card">
      <h2>검토 이력</h2>
      <div id="history-list"></div>
    </div>
  </div>

</main>

<script>
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

document.querySelectorAll('nav .tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav .tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    $('#view-' + btn.dataset.view).classList.add('active');
    if (btn.dataset.view === 'guidelines') loadGuidelines();
    if (btn.dataset.view === 'history') loadHistory();
  });
});

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderResultTable(items) {
  const counts = { 적합: 0, 수정필요: 0, 불가: 0, 확인필요: 0 };
  items.forEach(it => counts[it.verdict] = (counts[it.verdict] || 0) + 1);

  let html = `<div class="card">
    <div class="summary">
      <span>적합 <b>${counts['적합'] || 0}</b></span>
      <span>수정필요 <b>${counts['수정필요'] || 0}</b></span>
      <span>불가 <b>${counts['불가'] || 0}</b></span>
      ${counts['확인필요'] ? `<span>확인필요 <b>${counts['확인필요']}</b></span>` : ''}
    </div>
    <table>
      <thead><tr><th>항목</th><th>판정</th><th>사유</th><th>근거 지침</th><th>수정 제안</th></tr></thead>
      <tbody>`;
  for (const it of items) {
    html += `<tr>
      <td><b>${escapeHtml(it.item_label)}</b><div class="item-content">${escapeHtml(it.item_content).slice(0, 300)}</div></td>
      <td><span class="badge ${it.verdict}">${escapeHtml(it.verdict)}</span></td>
      <td>${escapeHtml(it.reason)}</td>
      <td class="muted">${escapeHtml(it.guideline_ref)}</td>
      <td>${escapeHtml(it.suggestion)}</td>
    </tr>`;
  }
  html += `</tbody></table></div>`;
  return html;
}

$('#btn-review').addEventListener('click', async () => {
  const fileInput = $('#plan-file');
  if (!fileInput.files.length) { alert('사업계획서 파일을 선택하세요.'); return; }
  const btn = $('#btn-review');
  btn.disabled = true;
  $('#spinner').style.display = 'inline';
  $('#review-result').innerHTML = '';
  try {
    const fd = new FormData();
    fd.append('file', fileInput.files[0]);
    const res = await fetch('/review', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '검토 실패');
    $('#review-result').innerHTML = renderResultTable(data.items);
  } catch (e) {
    $('#review-result').innerHTML = `<div class="card" style="color:#b3261e">오류: ${escapeHtml(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    $('#spinner').style.display = 'none';
  }
});

$('#btn-upload-guideline').addEventListener('click', async () => {
  const fileInput = $('#guideline-file');
  if (!fileInput.files.length) { alert('지침 파일을 선택하세요.'); return; }
  const btn = $('#btn-upload-guideline');
  btn.disabled = true;
  $('#spinner-g').style.display = 'inline';
  try {
    const fd = new FormData();
    fd.append('file', fileInput.files[0]);
    const res = await fetch('/guidelines/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '업로드 실패');
    fileInput.value = '';
    await loadGuidelines();
  } catch (e) {
    alert('오류: ' + e.message);
  } finally {
    btn.disabled = false;
    $('#spinner-g').style.display = 'none';
  }
});

$('#btn-clear-guidelines').addEventListener('click', async () => {
  if (!confirm('학습된 지침을 전부 삭제할까요?')) return;
  await fetch('/guidelines', { method: 'DELETE' });
  await loadGuidelines();
});

async function loadGuidelines() {
  const res = await fetch('/guidelines');
  const data = await res.json();
  $('#review-hint').textContent = data.total_chunks
    ? `현재 학습된 지침 조항 ${data.total_chunks}개 (${data.sources.length}개 문서)`
    : '⚠️ 아직 학습된 지침이 없습니다. "지침 관리" 탭에서 먼저 업로드하세요.';
  const list = $('#guideline-list');
  if (!data.sources.length) {
    list.innerHTML = '<div class="empty">아직 업로드된 지침이 없습니다.</div>';
    return;
  }
  list.innerHTML = `<table><thead><tr><th>파일명</th><th>조항 수</th><th>업로드 시각</th></tr></thead><tbody>` +
    data.sources.map(s => `<tr><td>${escapeHtml(s.source_file)}</td><td>${s.n}</td><td class="muted">${escapeHtml(s.uploaded_at)}</td></tr>`).join('') +
    `</tbody></table>`;
}

async function loadHistory() {
  const res = await fetch('/review/sessions');
  const sessions = await res.json();
  const list = $('#history-list');
  if (!sessions.length) {
    list.innerHTML = '<div class="empty">검토 이력이 없습니다.</div>';
    return;
  }
  list.innerHTML = `<table><thead><tr><th>파일명</th><th>검토 시각</th><th></th></tr></thead><tbody>` +
    sessions.map(s => `<tr><td>${escapeHtml(s.filename)}</td><td class="muted">${escapeHtml(s.created_at)}</td>
      <td><button class="link-btn" onclick="viewSession(${s.id})">결과 보기</button></td></tr>`).join('') +
    `</tbody></table><div id="history-detail"></div>`;
}

async function viewSession(id) {
  const res = await fetch('/review/sessions/' + id);
  const data = await res.json();
  $('#history-detail').innerHTML = renderResultTable(data.items);
}
window.viewSession = viewSession;

loadGuidelines();
</script>

</body>
</html>
